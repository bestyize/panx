spring:
  datasource:
    url: jdbc:h2:mem:panx;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

panx:
  storage:
    root-dir: ./build/test-storage
    max-text-preview-bytes: 4096
  share:
    default-expire-hours: 24
  security:
    init-admin:
      enabled: true
      username: admin
      password: admin123
      display-name: Administrator
